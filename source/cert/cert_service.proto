syntax = "proto3";

package cert;

option go_package = "github.com/your/proto/cert";

import "common/common.proto";

// 证书服务 - SSL证书分发与管理
service CertService {
    // 分发SSL证书
    rpc DistributeCert(CertRequest) returns (CertResponse);
    
    // 证书续期
    rpc RenewCert(RenewRequest) returns (RenewResponse);
    
    // 证书验证
    rpc VerifyCert(VerifyRequest) returns (VerifyResponse);
    
    // 内网证书同步
    rpc SyncInternalCert(SyncRequest) returns (SyncResponse);
    
    // 证书吊销
    rpc RevokeCert(RevokeRequest) returns (common.StatusResponse);
    
    // 健康检查
    rpc HealthCheck(common.Empty) returns (common.StatusResponse);
}

message CertRequest {
    string domain = 1;
    string cert_type = 2;  // RSA, ECC
    int32 validity_days = 3;
    map<string, string> subject_info = 4;
}

message CertResponse {
    string cert_id = 1;
    string certificate_pem = 2;
    string private_key_pem = 3;
    string ca_certificate_pem = 4;
    string expires_at = 5;
}

message RenewRequest {
    string cert_id = 1;
    string domain = 2;
}

message RenewResponse {
    string cert_id = 1;
    string certificate_pem = 2;
    string private_key_pem = 3;
    string new_expires_at = 4;
}

message VerifyRequest {
    string certificate_pem = 1;
    string domain = 2;
}

message VerifyResponse {
    bool valid = 1;
    string error_message = 2;
    string expires_at = 3;
    string issuer = 4;
}

message SyncRequest {
    string target_server = 1;
    repeated string cert_ids = 2;
    bool force_sync = 3;
}

message SyncResponse {
    bool success = 1;
    repeated string synced_cert_ids = 2;
    repeated string failed_cert_ids = 3;
}

message RevokeRequest {
    string cert_id = 1;
    string reason = 2;
}