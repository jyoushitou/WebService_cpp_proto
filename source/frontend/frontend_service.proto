syntax = "proto3";

package frontend;

option go_package = "github.com/your/proto/frontend";

import "common/common.proto";

// 前端服务 - Vue前端数据接口
service FrontendService {
    // 获取页面数据
    rpc GetPageData(PageDataRequest) returns (PageDataResponse);
    
    // 用户操作
    rpc UserAction(UserActionRequest) returns (UserActionResponse);
    
    // 实时事件订阅 (服务端推送)
    rpc SubscribeEvents(EventSubscriptionRequest) returns (stream EventResponse);
    
    // 文件上传
    rpc UploadFile(stream FileChunk) returns (FileUploadResponse);
    
    // 文件下载
    rpc DownloadFile(FileDownloadRequest) returns (stream FileChunk);
}

message PageDataRequest {
    string page_name = 1;
    map<string, string> params = 2;
    common.PageRequest pagination = 3;
}

message PageDataResponse {
    string page_name = 1;
    bytes data = 2;
    common.PageResponse pagination = 3;
}

message UserActionRequest {
    string action_type = 1;
    bytes action_data = 2;
    string session_id = 3;
}

message UserActionResponse {
    bool success = 1;
    bytes result = 2;
    string message = 3;
}

message EventSubscriptionRequest {
    string user_id = 1;
    repeated string event_types = 2;
}

message EventResponse {
    string event_type = 1;
    bytes data = 2;
    string timestamp = 3;
}

message FileChunk {
    string file_name = 1;
    bytes content = 2;
    int32 chunk_index = 3;
    int32 total_chunks = 4;
    string file_id = 5;
}

message FileUploadResponse {
    string file_id = 1;
    string url = 2;
    int64 size_bytes = 3;
}

message FileDownloadRequest {
    string file_id = 1;
    string file_name = 2;
}