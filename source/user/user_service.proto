syntax = "proto3";

package user;

option go_package = "github.com/your/proto/user";

import "common/common.proto";

service UserService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc Logout(LogoutRequest) returns (common.StatusResponse);
    rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
    rpc UpdateUserInfo(UpdateUserInfoRequest) returns (common.StatusResponse);
    rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
    rpc RemoveDevice(RemoveDeviceRequest) returns (common.StatusResponse);
    rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
    rpc HealthCheck(common.Empty) returns (common.StatusResponse);
}

message RegisterRequest {
    string username = 1;
    string password = 2;
    string email = 3;
}

message RegisterResponse {
    int64 user_id = 1;
    string token = 2;
    int64 created_at = 3;
}

message LoginRequest {
    string username = 1;
    string password = 2;
    string device_id = 3;
    string device_name = 4;
}

message LoginResponse {
    string token = 1;
    UserInfo user_info = 2;
    int64 expires_at = 3;
}

message LogoutRequest {
    string token = 1;
    string device_id = 2;
}

message UserInfo {
    int64 user_id = 1;
    string username = 2;
    string avatar = 3;
    string email = 4;
    int32 permission = 5;
    int64 created_at = 6;
}

message GetUserInfoRequest {
    int64 user_id = 1;
}

message GetUserInfoResponse {
    UserInfo user_info = 1;
}

message UpdateUserInfoRequest {
    int64 user_id = 1;
    string username = 2;
    string avatar = 3;
    string email = 4;
}

message DeviceInfo {
    string device_id = 1;
    string device_name = 2;
    string last_login_ip = 3;
    int64 last_login_at = 4;
    bool is_current = 5;
}

message ListDevicesRequest {
    int64 user_id = 1;
}

message ListDevicesResponse {
    repeated DeviceInfo devices = 1;
}

message RemoveDeviceRequest {
    int64 user_id = 1;
    string device_id = 2;
}

message VerifyTokenRequest {
    string token = 1;
    string service_name = 2;
    string method_name = 3;
}

message VerifyTokenResponse {
    bool valid = 1;
    int64 user_id = 2;
    int32 permission = 3;
}
