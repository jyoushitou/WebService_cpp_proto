syntax = "proto3";

package gateway;

option go_package = "github.com/your/proto/gateway";

import "common/common.proto";

// 网关服务 - 统一入口
service GatewayService {
    // 路由请求到后端微服务
    rpc RouteRequest(RouteRequest) returns (RouteResponse);
    
    // HTTP协议转gRPC
    rpc HttpToGrpc(HttpRequest) returns (HttpResponse);
    
    // 限流控制
    rpc RateLimit(RateLimitRequest) returns (RateLimitResponse);
    
    // 鉴权验证
    rpc Authenticate(AuthRequest) returns (AuthResponse);
}

message RouteRequest {
    string service_name = 1;
    string method_name = 2;
    bytes payload = 3;
    map<string, string> metadata = 4;
}

message RouteResponse {
    int32 status_code = 1;
    bytes data = 2;
    string error_message = 3;
}

message HttpRequest {
    string method = 1;
    string path = 2;
    map<string, string> headers = 3;
    bytes body = 4;
    map<string, string> query_params = 5;
}

message HttpResponse {
    int32 status_code = 1;
    map<string, string> headers = 2;
    bytes body = 3;
}

message RateLimitRequest {
    string client_ip = 1;
    string api_path = 2;
    int32 request_count = 3;
}

message RateLimitResponse {
    bool allowed = 1;
    int32 remaining_quota = 2;
    int32 reset_time_seconds = 3;
}

message AuthRequest {
    string token = 1;
    string service_name = 2;
    string method_name = 3;
}

message AuthResponse {
    bool authenticated = 1;
    string user_id = 2;
    repeated string permissions = 3;
}